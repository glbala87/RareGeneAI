name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  # Test-only keys (not used in production)
  RAREGENEAI_SECRET_KEY: "test-secret-key-for-ci-only-not-production"
  RAREGENEAI_ENCRYPTION_KEY: "dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktb25seQ=="
  RAREGENEAI_DATABASE_URL: "sqlite:///test.db"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check raregeneai/ tests/

      - name: Ruff format check
        run: ruff format --check raregeneai/ tests/

      - name: MyPy type check
        run: mypy raregeneai/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raregeneai
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: raregeneai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zlib1g-dev libbz2-dev liblzma-dev libcurl4-openssl-dev

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          RAREGENEAI_DATABASE_URL: postgresql://raregeneai:testpassword@localhost:5432/raregeneai_test
        run: |
          pytest tests/ \
            --cov=raregeneai \
            --cov-report=xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install bandit safety pip-audit

      - name: Bandit security scan
        run: bandit -r raregeneai/ -c pyproject.toml

      - name: pip-audit vulnerability scan
        run: pip-audit

      - name: Safety check
        run: safety check
